{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Login to Your Account
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>

            </form>

            <p class="text-center mt-3">
                Don't have an account?
                <a href="/register/">
                    Register
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
